<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M2 LOG Tool</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9D%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="topbar">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
          <div class="brand-text">
            <h1>M2 LOG Tool</h1>
            <span data-i18n="brand.subtitle">實驗工具集 · Toolbox</span>
          </div>
        </div>

        <!-- Top-level feature tabs -->
        <nav class="feature-tabs" id="featureTabs">
          <button class="feature-tab active" data-view="logoutput">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            <span data-i18n="tab.logoutput">LOG_OUTPUT</span>
          </button>
        </nav>

        <div class="topbar-actions">
          <button class="btn btn-ghost btn-lang" id="btnLang" title="切換語言 / Switch language">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            </svg>
            <span id="langLabel">EN</span>
          </button>
          <button class="btn btn-ghost" id="btnOpenExplorer" data-i18n-title="btn.explorer.title" title="開啟輸出資料夾">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
            </svg>
            <span data-i18n="btn.explorer">檔案總管</span>
          </button>
        </div>
      </header>

      <!-- ===================== LOG_OUTPUT view ===================== -->
      <div class="feature-view active" id="view-logoutput">
      <!-- Main -->
      <main class="layout">
        <!-- Left: experiment fields -->
        <section class="panel panel-form">
          <div class="panel-head">
            <h2 data-i18n="panel.expFields">實驗欄位</h2>
            <span class="hint" data-i18n="panel.expFields.hint">Experiment Info</span>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="experimentName"><span data-i18n="field.expName">實驗名稱</span> <span class="req">*</span> <span class="opt" data-i18n="field.expName.opt">限英文</span></label>
              <input id="experimentName" type="text" data-i18n-ph="field.expName.ph" placeholder="e.g. Boot Stress Test" autocomplete="off" />
              <small><span data-i18n="field.expName.note">必須是英文。輸出資料夾：</span><code id="folderPreview">YYYYMMDD_HHmm_ABBREVIATE</code></small>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="date" data-i18n="field.date">日期</label>
                <input id="date" type="date" />
              </div>
              <div class="field">
                <label for="tester" data-i18n="field.tester">測試人員</label>
                <input id="tester" type="text" data-i18n-ph="field.tester.ph" placeholder="測試人員" autocomplete="off" />
              </div>
            </div>

            <div class="field">
              <label for="testCase" data-i18n="field.testCase">測試項目</label>
              <input id="testCase" type="text" data-i18n-ph="field.testCase.ph" placeholder="測試項目 / 情境" autocomplete="off" />
            </div>

            <div class="field">
              <label for="notes" data-i18n="field.notes">備註</label>
              <textarea id="notes" rows="3" data-i18n-ph="field.notes.ph" placeholder="備註..."></textarea>
            </div>

            <!-- Custom fields -->
            <div class="field">
              <div class="custom-head">
                <label><span data-i18n="custom.title">自訂欄位</span> <span class="opt" data-i18n="custom.opt">Custom Fields</span></label>
                <button type="button" class="btn btn-ghost btn-sm" id="btnAddField" data-i18n="btn.addField">+ 新增欄位</button>
              </div>
              <div id="customFields" class="custom-list"></div>
            </div>

            <div class="field">
              <label for="outputBase"><span data-i18n="field.outputBase">輸出根目錄</span> <span class="opt" data-i18n="field.outputBase.opt">(選填)</span></label>
              <input id="outputBase" type="text" data-i18n-ph="field.outputBase.ph" placeholder="留空 = 專案內 LOG_OUTPUT/" autocomplete="off" />
              <small data-i18n="field.outputBase.note">可填絕對路徑，例如 D:\\Logs</small>
            </div>
          </div>
        </section>

        <!-- Draggable splitter -->
        <div class="splitter" id="splitter" data-i18n-title="splitter.title" title="拖曳調整左右寬度"></div>

        <!-- Right: log input -->
        <section class="panel panel-log">
          <div class="panel-head">
            <div class="tabs">
              <button class="tab active" data-target="uefi">
                <span class="dot dot-uefi"></span> UEFI
              </button>
              <button class="tab" data-target="sam">
                <span class="dot dot-sam"></span> SAM
              </button>
            </div>
            <div class="log-tools">
              <span class="counter" id="counter">0 行 · 0 字元</span>
              <button class="btn btn-ghost btn-sm" id="btnClearLogs" data-i18n-title="btn.clear.title" data-i18n="btn.clear" title="清空兩個 LOG">清除</button>
            </div>
          </div>
          <div class="panel-body log-body">
            <div class="log-pane active" id="pane-uefi">
              <textarea id="uefiLog" class="log-input" spellcheck="false" data-i18n-ph="log.uefi.ph" placeholder="在此貼上 UEFI LOG..."></textarea>
            </div>
            <div class="log-pane" id="pane-sam">
              <textarea id="samLog" class="log-input" spellcheck="false" data-i18n-ph="log.sam.ph" placeholder="在此貼上 SAM LOG..."></textarea>
            </div>
          </div>
        </section>
      </main>

      <!-- Action bar -->
      <footer class="actionbar">
        <div class="action-left">
          <span class="kbd-hint"><span data-i18n="kbd.pre">提示：</span><kbd>Ctrl</kbd> + <kbd>Enter</kbd><span data-i18n="kbd.post"> 快速輸出</span></span>
        </div>
        <div class="action-right">
          <button class="btn btn-primary" id="btnExport">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span data-i18n="btn.export">輸出</span>
          </button>
        </div>
      </footer>

      <!-- Result -->
      <section class="result hidden" id="result"></section>
      </div>
      <!-- ===================== /LOG_OUTPUT view ===================== -->
    </div>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>

    <script src="app.js"></script>
  </body>
</html>
